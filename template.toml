[metadata]
name = "WordPress Optimized"
description = "High-performance WordPress stack with PHP-FPM, Nginx, FastCGI caching, and security hardening"
version = "2.0.0"
author = "Community"

[variables]
main_domain = "${domain}"
db_name = "wordpress"
db_user = "wordpress"
db_password = "${password:32}"
redis_password = "${password:32}"
wordpress_debug = "0"

[config]
compose_file = "docker-compose.yml"
env = [
  "WORDPRESS_DEBUG=${wordpress_debug}",
  "DB_NAME=${db_name}",
  "DB_USER=${db_user}",
  "DB_PASSWORD=${db_password}",
  "REDIS_PASSWORD=${redis_password}"
]

[[config.domains]]
serviceName = "nginx"
port = 80
host = "${main_domain}"

[[config.mounts]]
filePath = "uploads.ini"
content = """upload_max_filesize = 64M
post_max_size = 64M
memory_limit = 256M
max_execution_time = 300
max_input_vars = 3000
"""

[[config.mounts]]
filePath = "Dockerfile.nginx"
content = """FROM nginx:alpine

# Remove default nginx config
RUN rm -f /etc/nginx/conf.d/default.conf

# Copy our custom config
COPY nginx.conf /etc/nginx/nginx.conf
"""

[[config.mounts]]
filePath = "nginx.conf"
content = '''events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    
    # Gzip
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/xhtml+xml application/x-font-ttf application/x-font-opentype application/vnd.ms-fontobject image/svg+xml;
    
    # FastCGI cache
    fastcgi_cache_path /var/cache/nginx levels=1:2 keys_zone=WORDPRESS:10m inactive=60m;
    fastcgi_cache_key "$scheme$request_method$host$request_uri";
    
    server {
        listen 80;
        server_name _;
        
        root /var/www/html;
        index index.php index.html;
        
        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        
        # WordPress
        location / {
            try_files $uri $uri/ /index.php?$args;
        }
        
        # PHP-FPM
        location ~ \.php$ {
            try_files $uri =404;
            fastcgi_split_path_info ^(.+\.php)(/.+)$;
            
            # PHP-FPM connection
            fastcgi_pass wordpress:9000;
            fastcgi_index index.php;
            
            # FastCGI params
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param PATH_INFO $fastcgi_path_info;
            
            # FastCGI cache
            set $skip_cache 0;
            
            # POST requests should always go to PHP
            if ($request_method = POST) {
                set $skip_cache 1;
            }
            
            # URLs with query strings should always go to PHP
            if ($query_string != "") {
                set $skip_cache 1;
            }
            
            # Don't cache WordPress admin and login pages
            if ($request_uri ~* "/wp-admin/|/xmlrpc.php|wp-.*.php|/feed/|index.php|sitemap(_index)?.xml") {
                set $skip_cache 1;
            }
            
            # Don't use the cache for logged-in users or recent commenters
            if ($http_cookie ~* "comment_author|wordpress_[a-f0-9]+|wp-postpass|wordpress_no_cache|wordpress_logged_in") {
                set $skip_cache 1;
            }
            
            fastcgi_cache_bypass $skip_cache;
            fastcgi_no_cache $skip_cache;
            fastcgi_cache WORDPRESS;
            fastcgi_cache_valid 60m;
            
            # Add cache status header
            add_header X-FastCGI-Cache $upstream_cache_status;
            
            # FastCGI buffers
            fastcgi_buffer_size 128k;
            fastcgi_buffers 256 16k;
            fastcgi_busy_buffers_size 256k;
            fastcgi_temp_file_write_size 256k;
        }
        
        # Static files
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 365d;
            add_header Cache-Control "public, immutable";
            log_not_found off;
        }
        
        # Deny access to sensitive files
        location ~ /\. {
            deny all;
        }
        
        location = /xmlrpc.php {
            deny all;
        }
        
        location ~ /wp-config\.php {
            deny all;
        }
        
        # Health check endpoint
        location = /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
'''

[[config.mounts]]
filePath = "docker-compose.yml"
content = '''services:
  wordpress:
    image: wordpress:php8.4-fpm
    volumes:
      - wp_app:/var/www/html
      - ./uploads.ini:/usr/local/etc/php/conf.d/uploads.ini
    environment:
      WORDPRESS_DB_HOST: wp_db:3306
      WORDPRESS_DB_NAME: ${DB_NAME}
      WORDPRESS_DB_USER: ${DB_USER}
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD}
      WORDPRESS_DEBUG: ${WORDPRESS_DEBUG:-0}
      WORDPRESS_CONFIG_EXTRA: |
        /* Redis Configuration */
        define('WP_REDIS_HOST', 'redis');
        define('WP_REDIS_PORT', 6379);
        define('WP_REDIS_PASSWORD', '${REDIS_PASSWORD}');
        define('WP_REDIS_TIMEOUT', 1);
        define('WP_REDIS_READ_TIMEOUT', 1);
        define('WP_REDIS_DATABASE', 0);
        
        /* Performance Settings */
        define('WP_MEMORY_LIMIT', '512M');
        define('WP_MAX_MEMORY_LIMIT', '1024M');
        define('DISABLE_WP_CRON', false);
        define('WP_POST_REVISIONS', 5);
        define('AUTOSAVE_INTERVAL', 300);
        define('EMPTY_TRASH_DAYS', 30);
        
        /* Security Settings */
        define('FORCE_SSL_ADMIN', true);
        define('DISALLOW_FILE_EDIT', true);
        
        /* Cache Settings */
        define('WP_CACHE', true);
        define('CONCATENATE_SCRIPTS', false);
        define('COMPRESS_SCRIPTS', true);
        define('COMPRESS_CSS', true);
        define('ENFORCE_GZIP', true);
    depends_on:
      wp_db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - dokploy-network
    healthcheck:
      test: ["CMD-SHELL", "pidof php-fpm || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  wp_db:
    image: mysql:8.4
    restart: unless-stopped
    volumes:
      - wp_data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "exit | mysql -h localhost -P 3306 -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - dokploy-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256m --maxmemory-policy allkeys-lru
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    networks:
      - dokploy-network

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    restart: unless-stopped
    depends_on:
      - wordpress
    volumes:
      - wp_app:/var/www/html:ro
    networks:
      - dokploy-network

volumes:
  wp_data:
  wp_app:

networks:
  dokploy-network:
    external: true
'''