[metadata]
name = "WordPress Optimized"
description = "High-performance WordPress stack with PHP-FPM, Nginx, FastCGI caching, and security hardening"
version = "2.0.0"
author = "Community"

[variables]
main_domain = "${domain}"
db_name = "wordpress"
db_user = "wordpress"
db_password = "${password:32}"
redis_password = "${password:32}"
wordpress_debug = "0"

[config]
compose_file = "docker-compose.yml"
env = [
  "WORDPRESS_DEBUG=${wordpress_debug}",
  "DB_NAME=${db_name}",
  "DB_USER=${db_user}",
  "DB_PASSWORD=${db_password}",
  "REDIS_PASSWORD=${redis_password}"
]

[[config.domains]]
serviceName = "nginx"
port = 80
host = "${main_domain}"

[[config.mounts]]
filePath = "uploads.ini"
content = """upload_max_filesize = 64M
post_max_size = 64M
memory_limit = 256M
max_execution_time = 300
max_input_vars = 3000
"""

[[config.mounts]]
filePath = "Dockerfile.nginx"
content = """FROM nginx:alpine

# Remove default nginx config
RUN rm -f /etc/nginx/conf.d/default.conf

# Copy our custom config
COPY nginx.conf /etc/nginx/nginx.conf
"""

[[config.mounts]]
filePath = "nginx.conf"
content = '''events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # Real IP configuration for Cloudflare and Docker
    # Cloudflare IPv4
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    
    # Cloudflare IPv6
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    
    # Docker/local networks
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    set_real_ip_from 127.0.0.1;
    
    # Use CF-Connecting-IP header from Cloudflare
    real_ip_header CF-Connecting-IP;
    real_ip_recursive on;
    
    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    
    # Security
    server_tokens off;
    client_max_body_size 100M;
    client_body_buffer_size 128k;
    
    # Gzip
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/xhtml+xml application/x-font-ttf application/x-font-opentype application/vnd.ms-fontobject image/svg+xml;
    
    # FastCGI cache
    fastcgi_cache_path /var/cache/nginx levels=1:2 keys_zone=WORDPRESS:100m inactive=60m;
    fastcgi_cache_key "$scheme$request_method$http_host$request_uri";
    fastcgi_cache_use_stale error timeout updating invalid_header http_500 http_503;
    
    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=wplogin:10m rate=3r/s;
    limit_req_zone $binary_remote_addr zone=wprest:10m rate=10r/s;
    
    # Logging
    error_log /var/log/nginx/error.log warn;
    access_log /var/log/nginx/access.log;
    
    server {
        listen 80;
        server_name _;
        
        root /var/www/html;
        index index.php index.html;
        
        # Error pages
        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;
        
        # Global security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        
        # Favicon and robots.txt
        location = /favicon.ico {
            log_not_found off;
            access_log off;
        }
        
        location = /robots.txt {
            log_not_found off;
            access_log off;
            allow all;
        }
        
        # REST API
        location /wp-json/ {
            limit_req zone=wprest burst=20 nodelay;
            try_files $uri $uri/ /index.php?$args;
            
            # CORS headers for REST API
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
            
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }
        }
        
        # WordPress
        location / {
            try_files $uri $uri/ /index.php?$args;
        }
        
        # PHP-FPM
        location ~ \.php$ {
            try_files $uri =404;
            fastcgi_split_path_info ^(.+\.php)(/.+)$;
            
            # PHP-FPM connection
            fastcgi_pass wordpress:9000;
            fastcgi_index index.php;
            
            # FastCGI params
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param PATH_INFO $fastcgi_path_info;
            fastcgi_param PATH_TRANSLATED $document_root$fastcgi_path_info;
            
            # Pass real IP to PHP
            fastcgi_param REMOTE_ADDR $remote_addr;
            fastcgi_param HTTP_X_REAL_IP $remote_addr;
            fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
            
            # Pass authorization headers
            fastcgi_param HTTP_AUTHORIZATION $http_authorization;
            fastcgi_pass_header Authorization;
            
            # FastCGI cache settings
            set $skip_cache 0;
            
            # POST requests should always go to PHP
            if ($request_method = POST) {
                set $skip_cache 1;
            }
            
            # Don't cache for specific query strings
            if ($query_string ~* "preview=true|wp_customize=on") {
                set $skip_cache 1;
            }
            
            # Don't cache REST API requests
            if ($query_string ~* "rest_route") {
                set $skip_cache 1;
            }
            
            # Don't cache WordPress admin, login, and specific pages
            if ($request_uri ~* "(/wp-admin/|/wp-json/|/xmlrpc\.php|/wp-.*\.php|/feed/|index\.php|sitemap(_index)?\.xml)") {
                set $skip_cache 1;
            }
            
            # Don't cache WooCommerce pages
            if ($request_uri ~* "/(cart|checkout|my-account)/*$") {
                set $skip_cache 1;
            }
            
            # Don't use the cache for logged-in users or recent commenters
            if ($http_cookie ~* "comment_author|wordpress_[a-f0-9]+|wp-postpass|wordpress_no_cache|wordpress_logged_in") {
                set $skip_cache 1;
            }
            
            # Don't cache when WooCommerce cart contains items
            if ($http_cookie ~* "woocommerce_items_in_cart") {
                set $skip_cache 1;
            }
            
            fastcgi_cache_bypass $skip_cache;
            fastcgi_no_cache $skip_cache;
            fastcgi_cache WORDPRESS;
            fastcgi_cache_valid 60m;
            
            # Add cache status header
            add_header X-FastCGI-Cache $upstream_cache_status always;
            
            # Add cache headers for cached responses
            set $cache_control_header "no-cache, must-revalidate, max-age=0";
            if ($upstream_cache_status = "HIT") {
                set $cache_control_header "public, max-age=3600";
            }
            add_header Cache-Control $cache_control_header always;
            add_header X-Cache-Enabled "true" always;
            
            # Add Vary header for proper caching
            add_header Vary "Accept-Encoding, Cookie" always;
            
            # FastCGI buffers
            fastcgi_buffer_size 128k;
            fastcgi_buffers 256 16k;
            fastcgi_busy_buffers_size 256k;
            fastcgi_temp_file_write_size 256k;
            fastcgi_read_timeout 300;
        }
        
        # WordPress login with rate limiting
        location = /wp-login.php {
            limit_req zone=wplogin burst=3 nodelay;
            
            fastcgi_pass wordpress:9000;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            
            # Pass real IP to PHP
            fastcgi_param REMOTE_ADDR $remote_addr;
            fastcgi_param HTTP_X_REAL_IP $remote_addr;
            fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
            
            fastcgi_param HTTP_AUTHORIZATION $http_authorization;
            fastcgi_pass_header Authorization;
        }
        
        # Static files with modern formats
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
            expires 365d;
            add_header Cache-Control "public, immutable";
            log_not_found off;
            access_log off;
        }
        
        # Deny access to sensitive files
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
        
        # Deny access to backup and source files
        location ~* \.(bak|config|sql|fla|psd|ini|log|sh|inc|swp|dist)$ {
            deny all;
        }
        
        # Deny access to PHP files in uploads directory
        location ~* /(?:uploads|files|wp-content|wp-includes)/.*\.php$ {
            deny all;
        }
        
        # Deny access to wp-config.php
        location ~ /wp-config\.php {
            deny all;
        }
        
        # Block XML-RPC (if not needed)
        location = /xmlrpc.php {
            deny all;
            access_log off;
            log_not_found off;
        }
        
        # Health check endpoint
        location = /health {
            access_log off;
            return 200 "healthy\\n";
            add_header Content-Type text/plain;
        }
        
        # Handle missing static files without logging
        location ~* \.(js|css|png|jpg|jpeg|gif|ico)$ {
            log_not_found off;
        }
    }
}
'''

[[config.mounts]]
filePath = "Dockerfile.wordpress"
content = """FROM wordpress:php8.4-fpm

# Install dependencies for building ImageMagick with AVIF support
RUN apt-get update && apt-get install -y \\
    build-essential \\
    autoconf \\
    automake \\
    libtool \\
    pkg-config \\
    cmake \\
    git \\
    wget \\
    sudo \\
    # ImageMagick dependencies
    libpng-dev \\
    libjpeg-dev \\
    libtiff-dev \\
    libwebp-dev \\
    libfreetype6-dev \\
    libfontconfig1-dev \\
    libheif-dev \\
    libde265-dev \\
    # AVIF dependencies
    libaom-dev \\
    libdav1d-dev \\
    && rm -rf /var/lib/apt/lists/*

# Build and install libavif from source with libyuv
RUN cd /tmp && \\
    git clone https://github.com/AOMediaCodec/libavif.git && \\
    cd libavif && \\
    mkdir build && cd build && \\
    cmake -DCMAKE_BUILD_TYPE=Release -DAVIF_CODEC_AOM=ON -DAVIF_CODEC_DAV1D=ON -DAVIF_LIBYUV=LOCAL .. && \\
    make -j$(nproc) && \\
    make install && \\
    ldconfig && \\
    cd / && rm -rf /tmp/libavif

# Build and install ImageMagick with AVIF support
RUN cd /tmp && \\
    git clone https://github.com/ImageMagick/ImageMagick.git && \\
    cd ImageMagick && \\
    ./configure \\
        --with-avif=yes \\
        --with-webp=yes \\
        --with-heic=yes \\
        --with-jpeg=yes \\
        --with-png=yes \\
        --with-tiff=yes \\
        --with-freetype=yes \\
        --with-fontconfig=yes \\
        --enable-shared \\
        --disable-static \\
        --with-modules && \\
    make -j$(nproc) && \\
    make install && \\
    ldconfig && \\
    cd / && rm -rf /tmp/ImageMagick

# Install imagick PHP extension
RUN pecl install imagick && \\
    docker-php-ext-enable imagick

# Create a custom entrypoint script
RUN echo '#!/bin/bash\\\\n\\\\
# Ensure nginx cache directory has proper permissions\\\\n\\\\
if [ -d "/var/cache/nginx" ]; then\\\\n\\\\
    # Make cache directory writable by www-data\\\\n\\\\
    chmod -R 777 /var/cache/nginx\\\\n\\\\
fi\\\\n\\\\
# Call the original entrypoint\\\\n\\\\
exec docker-entrypoint.sh "$@"' > /custom-entrypoint.sh && \\\\
    chmod +x /custom-entrypoint.sh

ENTRYPOINT ["/custom-entrypoint.sh"]
CMD ["php-fpm"]
"""

[[config.mounts]]
filePath = "docker-compose.yml"
content = '''services:
  wordpress:
    build:
      context: .
      dockerfile: Dockerfile.wordpress
    volumes:
      - wp_app:/var/www/html
      - ./uploads.ini:/usr/local/etc/php/conf.d/uploads.ini
      - nginx_cache:/var/cache/nginx
    environment:
      WORDPRESS_DB_HOST: wp_db:3306
      WORDPRESS_DB_NAME: ${DB_NAME}
      WORDPRESS_DB_USER: ${DB_USER}
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD}
      WORDPRESS_DEBUG: ${WORDPRESS_DEBUG:-0}
      WORDPRESS_CONFIG_EXTRA: |
        /* Redis Configuration */
        define('WP_REDIS_HOST', 'redis');
        define('WP_REDIS_PORT', 6379);
        define('WP_REDIS_PASSWORD', '${REDIS_PASSWORD}');
        define('WP_REDIS_TIMEOUT', 1);
        define('WP_REDIS_READ_TIMEOUT', 1);
        define('WP_REDIS_DATABASE', 0);
        
        /* Performance Settings */
        define('WP_MEMORY_LIMIT', '512M');
        define('WP_MAX_MEMORY_LIMIT', '1024M');
        define('DISABLE_WP_CRON', false);
        define('WP_POST_REVISIONS', 5);
        define('AUTOSAVE_INTERVAL', 300);
        define('EMPTY_TRASH_DAYS', 30);
        
        /* Security Settings */
        define('FORCE_SSL_ADMIN', true);
        define('DISALLOW_FILE_EDIT', true);
        
        /* Cache Settings */
        define('WP_CACHE', true);
        define('CONCATENATE_SCRIPTS', false);
        define('COMPRESS_SCRIPTS', true);
        define('COMPRESS_CSS', true);
        define('ENFORCE_GZIP', true);
        
        /* Real IP Detection for Cloudflare and Proxies */
        if (isset($_SERVER['HTTP_CF_CONNECTING_IP'])) {
            $_SERVER['REMOTE_ADDR'] = $_SERVER['HTTP_CF_CONNECTING_IP'];
        } elseif (isset($_SERVER['HTTP_X_FORWARDED_FOR'])) {
            $forwarded_ips = explode(',', $_SERVER['HTTP_X_FORWARDED_FOR']);
            $_SERVER['REMOTE_ADDR'] = trim($forwarded_ips[0]);
        } elseif (isset($_SERVER['HTTP_X_REAL_IP'])) {
            $_SERVER['REMOTE_ADDR'] = $_SERVER['HTTP_X_REAL_IP'];
        }
    depends_on:
      wp_db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - dokploy-network
    healthcheck:
      test: ["CMD-SHELL", "pidof php-fpm || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  wp_db:
    image: mysql:8.4
    restart: unless-stopped
    volumes:
      - wp_data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "exit | mysql -h localhost -P 3306 -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - dokploy-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256m --maxmemory-policy allkeys-lru
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    networks:
      - dokploy-network

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    restart: unless-stopped
    depends_on:
      - wordpress
    volumes:
      - wp_app:/var/www/html:ro
      - nginx_cache:/var/cache/nginx
    networks:
      - dokploy-network

volumes:
  wp_data:
  wp_app:
  nginx_cache:

networks:
  dokploy-network:
    external: true
'''