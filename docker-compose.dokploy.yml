---

services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pChangeMe_RootPass2024!"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s
    environment:
      MYSQL_ROOT_PASSWORD: ChangeMe_RootPass2024!
      MYSQL_DATABASE: wordpress_production
      MYSQL_USER: wordpress_user
      MYSQL_PASSWORD: ChangeMe_DBPass2024!
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql.cnf:/etc/mysql/conf.d/custom.cnf:ro
    networks:
      - dokploy-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ChangeMe_RedisPass2024! --maxmemory 2gb --maxmemory-policy allkeys-lru --save 60 1 --save 300 10 --save 900 100
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "ChangeMe_RedisPass2024!", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - redis_data:/data
    networks:
      - dokploy-network

  wordpress:
    image: wordpress:php8.4-fpm
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    environment:
      # Database
      WORDPRESS_DB_HOST: mysql:3306
      WORDPRESS_DB_USER: wordpress_user
      WORDPRESS_DB_PASSWORD: ChangeMe_DBPass2024!
      WORDPRESS_DB_NAME: wordpress_production
      WORDPRESS_TABLE_PREFIX: wp_
      WORDPRESS_DEBUG: false
      # PHP Configuration
      PHP_MEMORY_LIMIT: 512M
      PHP_MAX_EXECUTION_TIME: 300
      PHP_MAX_INPUT_VARS: 5000
      # Extra configuration
      WORDPRESS_CONFIG_EXTRA: |
        /* Redis Configuration */
        define('WP_REDIS_HOST', 'redis');
        define('WP_REDIS_PORT', 6379);
        define('WP_REDIS_PASSWORD', 'ChangeMe_RedisPass2024!');
        define('WP_REDIS_DATABASE', 0);
        define('WP_REDIS_TIMEOUT', 1);
        define('WP_REDIS_READ_TIMEOUT', 1);
        define('WP_REDIS_DISABLED', false);
        define('WP_CACHE_KEY_SALT', 'wordpress_production_');
        
        /* Performance Settings */
        define('WP_MEMORY_LIMIT', '512M');
        define('WP_MAX_MEMORY_LIMIT', '1024M');
        define('DISABLE_WP_CRON', true);
        define('WP_POST_REVISIONS', 5);
        define('AUTOSAVE_INTERVAL', 300);
        define('EMPTY_TRASH_DAYS', 30);
        
        /* Security Settings */
        define('FORCE_SSL_ADMIN', true);
        define('DISALLOW_FILE_EDIT', true);
        define('DISALLOW_FILE_MODS', false);
        
        /* Database Optimization */
        define('WP_ALLOW_REPAIR', false);
        $$wpdb->query('SET SESSION query_cache_type = ON');
    volumes:
      - wordpress:/var/www/html
      - ./uploads.ini:/usr/local/etc/php/conf.d/uploads.ini:ro
      - ./php-fpm.conf:/usr/local/etc/php-fpm.d/zzz-custom.conf:ro
    networks:
      - dokploy-network

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - wordpress
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/nginx-health"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - wordpress:/var/www/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - dokploy-network

  cron:
    image: wordpress:php8.4-fpm
    restart: unless-stopped
    depends_on:
      - wordpress
    environment:
      # Same environment as wordpress service
      WORDPRESS_DB_HOST: mysql:3306
      WORDPRESS_DB_USER: wordpress_user
      WORDPRESS_DB_PASSWORD: ChangeMe_DBPass2024!
      WORDPRESS_DB_NAME: wordpress_production
    volumes:
      - wordpress:/var/www/html
    entrypoint: /bin/sh
    command: -c "while true; do sleep 60 && php /var/www/html/wp-cron.php; done"
    networks:
      - dokploy-network

volumes:
  wordpress:
  mysql_data:
  redis_data:

networks:
  dokploy-network:
    external: true