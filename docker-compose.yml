---

services:
  wordpress:
    image: wordpress:php8.4-fpm
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    environment:
      # Database Configuration
      # Option 1: Use DATABASE_URL (e.g., mysql://user:pass@host:port/dbname)
      DATABASE_URL: ${DATABASE_URL:-mysql://mysql:efw3zo2ivw98dpgf@cika-host-wpdb-zgtbn8:3306/mysql}
      
      # Option 2: Use individual variables (these override DATABASE_URL if set)
      WORDPRESS_DB_HOST: ${DB_HOST:-}
      WORDPRESS_DB_USER: ${DB_USER:-}
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD:-}
      WORDPRESS_DB_NAME: ${DB_NAME:-}
      
      # WordPress Configuration
      WORDPRESS_TABLE_PREFIX: ${TABLE_PREFIX:-wp_}
      WORDPRESS_DEBUG: ${WP_DEBUG:-false}
      
      # PHP Configuration
      PHP_MEMORY_LIMIT: ${PHP_MEMORY_LIMIT:-512M}
      PHP_MAX_EXECUTION_TIME: ${PHP_MAX_EXECUTION_TIME:-300}
      PHP_MAX_INPUT_VARS: ${PHP_MAX_INPUT_VARS:-5000}
      
      # Extra configuration
      WORDPRESS_CONFIG_EXTRA: |
        /* Parse DATABASE_URL if individual vars not set */
        if (empty($_ENV['WORDPRESS_DB_HOST']) && !empty($_ENV['DATABASE_URL'])) {
          $url = parse_url($_ENV['DATABASE_URL']);
          define('DB_HOST', $url['host'] . ':' . ($url['port'] ?? 3306));
          define('DB_USER', $url['user']);
          define('DB_PASSWORD', $url['pass']);
          define('DB_NAME', ltrim($url['path'], '/'));
        }
        
        /* Performance Settings */
        define('WP_MEMORY_LIMIT', '${WP_MEMORY_LIMIT:-512M}');
        define('WP_MAX_MEMORY_LIMIT', '${WP_MAX_MEMORY_LIMIT:-1024M}');
        define('DISABLE_WP_CRON', true);
        define('WP_POST_REVISIONS', ${WP_POST_REVISIONS:-5});
        define('AUTOSAVE_INTERVAL', ${AUTOSAVE_INTERVAL:-300});
        define('EMPTY_TRASH_DAYS', ${EMPTY_TRASH_DAYS:-30});
        
        /* Security Settings */
        define('FORCE_SSL_ADMIN', ${FORCE_SSL_ADMIN:-true});
        define('DISALLOW_FILE_EDIT', true);
        define('DISALLOW_FILE_MODS', ${DISALLOW_FILE_MODS:-false});
    volumes:
      - wordpress:/var/www/html
      - ./uploads.ini:/usr/local/etc/php/conf.d/uploads.ini:ro
      - ./php-fpm.conf:/usr/local/etc/php-fpm.d/zzz-custom.conf:ro
    networks:
      - dokploy-network

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - wordpress
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/nginx-health"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - wordpress:/var/www/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - dokploy-network

  cron:
    image: wordpress:php8.4-fpm
    restart: unless-stopped
    depends_on:
      - wordpress
    environment:
      # Same database configuration
      DATABASE_URL: ${DATABASE_URL:-mysql://mysql:efw3zo2ivw98dpgf@cika-host-wpdb-zgtbn8:3306/mysql}
      WORDPRESS_DB_HOST: ${DB_HOST:-}
      WORDPRESS_DB_USER: ${DB_USER:-}
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD:-}
      WORDPRESS_DB_NAME: ${DB_NAME:-}
    volumes:
      - wordpress:/var/www/html
    entrypoint: /bin/sh
    command: -c "while true; do sleep 60 && if [ -f /var/www/html/wp-cron.php ]; then php /var/www/html/wp-cron.php; fi; done"
    networks:
      - dokploy-network

volumes:
  wordpress:

networks:
  dokploy-network:
    external: true