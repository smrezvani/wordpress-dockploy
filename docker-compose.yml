version: '3.8'

services:
  init-configs:
    image: busybox:latest
    volumes:
      - ./config:/config:ro
      - ../files:/files
      - ./init-configs.sh:/init-configs.sh:ro
    command: sh /init-configs.sh
    networks:
      - dokploy-network

  wordpress:
    image: wordpress:php8.4-fpm
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      WORDPRESS_DB_HOST: mysql
      WORDPRESS_DB_USER: ${DB_USER}
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD}
      WORDPRESS_DB_NAME: ${DB_NAME}
      WORDPRESS_DEBUG: ${WORDPRESS_DEBUG:-0}
      TMPDIR: /tmp
      WORDPRESS_CONFIG_EXTRA: |
        /* Proxy headers */
        if (!empty($$_SERVER['HTTP_X_FORWARDED_PROTO']) && $$_SERVER['HTTP_X_FORWARDED_PROTO'] === 'https') {
            $$_SERVER['HTTPS'] = 'on';
        }
        
        /* Trust proxy headers */
        if (!empty($$_SERVER['HTTP_X_FORWARDED_FOR'])) {
            $$_SERVER['REMOTE_ADDR'] = $$_SERVER['HTTP_X_FORWARDED_FOR'];
        }
        if (!empty($$_SERVER['HTTP_X_FORWARDED_HOST'])) {
            $$_SERVER['HTTP_HOST'] = $$_SERVER['HTTP_X_FORWARDED_HOST'];
        }
        
        /* Allow loopback connections */
        define('ALTERNATE_WP_CRON', true);
        define('DISABLE_WP_CRON', true);
        define('WP_DEBUG_LOG', false);
        define('WP_DEBUG_DISPLAY', false);
        
        /* Disable auto updates for stability */
        define('AUTOMATIC_UPDATER_DISABLED', false);
        define('WP_AUTO_UPDATE_CORE', true);
        
        /* Redis Configuration */
        define('WP_REDIS_HOST', 'redis');
        define('WP_REDIS_PORT', 6379);
        define('WP_REDIS_PASSWORD', '${REDIS_PASSWORD}');
        define('WP_REDIS_TIMEOUT', 1);
        define('WP_REDIS_READ_TIMEOUT', 1);
        define('WP_REDIS_DATABASE', 0);

        /* Performance Settings */
        define('WP_MEMORY_LIMIT', '512M');
        define('WP_MAX_MEMORY_LIMIT', '1024M');
        define('WP_POST_REVISIONS', 5);
        define('AUTOSAVE_INTERVAL', 300);
        define('EMPTY_TRASH_DAYS', 30);

        /* Security Settings */
        define('DISALLOW_FILE_EDIT', true);

        /* Cache Settings */
        define('WP_CACHE', true);
        define('CONCATENATE_SCRIPTS', false);
        define('COMPRESS_SCRIPTS', true);
        define('COMPRESS_CSS', true);
        define('ENFORCE_GZIP', true);
    volumes:
      - ../files/wordpress:/var/www/html
      - ../files/wordpress/wp-content/uploads:/var/www/html/wp-content/uploads
      - ../files/99-custom.ini:/usr/local/etc/php/conf.d/99-custom.ini:ro
    depends_on:
      - init-configs
      - mysql
      - redis
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/wp-login.php || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - dokploy-network
    deploy:
      resources:
        limits:
          memory: 1024M

  nginx:
    image: nginx:stable
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - wordpress
      - init-configs
    volumes:
      - ../files/wordpress:/var/www/html:ro
      - ../files/wordpress/wp-content/uploads:/var/www/html/wp-content/uploads
      - ../files/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../files/cache:/var/cache/nginx
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - dokploy-network
    deploy:
      resources:
        limits:
          memory: 512M

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ../files/mysql:/var/lib/mysql
    command: >
      --mysql-native-password=ON
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max_connections=500
      --innodb_buffer_pool_size=256M
    networks:
      - dokploy-network
    deploy:
      resources:
        limits:
          memory: 768M

  redis:
    image: redis:alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256m --maxmemory-policy allkeys-lru --save ""
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - ../files/redis:/data
    networks:
      - dokploy-network
    deploy:
      resources:
        limits:
          memory: 384M

networks:
  dokploy-network:
    external: true
