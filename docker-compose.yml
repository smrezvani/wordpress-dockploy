services:
  cache-init:
    build:
      context: .
      dockerfile: Dockerfile.cache-init
    volumes:
      - nginx_cache:/var/cache/nginx
    networks:
      - dokploy-network
    command: |
      sh -c '
        mkdir -p /var/cache/nginx/client_temp /var/cache/nginx/fastcgi_temp /var/cache/nginx/proxy_temp /var/cache/nginx/scgi_temp /var/cache/nginx/uwsgi_temp
        chmod -R 777 /var/cache/nginx
        echo "Cache directories initialized"
        # Exit after initialization
        exit 0
      '

  wordpress:
    build:
      context: .
      dockerfile: Dockerfile.wordpress
    volumes:
      - wp_app:/var/www/html
      - ./uploads.ini:/usr/local/etc/php/conf.d/uploads.ini
    environment:
      WORDPRESS_DB_HOST: wp_db:3306
      WORDPRESS_DB_NAME: ${DB_NAME}
      WORDPRESS_DB_USER: ${DB_USER}
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD}
      WORDPRESS_DEBUG: ${WORDPRESS_DEBUG:-0}
      WORDPRESS_CONFIG_EXTRA: |
        /* Redis Configuration */
        define('WP_REDIS_HOST', 'redis');
        define('WP_REDIS_PORT', 6379);
        define('WP_REDIS_PASSWORD', '${REDIS_PASSWORD}');
        define('WP_REDIS_TIMEOUT', 1);
        define('WP_REDIS_READ_TIMEOUT', 1);
        define('WP_REDIS_DATABASE', 0);
        
        /* Performance Settings */
        define('WP_MEMORY_LIMIT', '512M');
        define('WP_MAX_MEMORY_LIMIT', '1024M');
        define('DISABLE_WP_CRON', false);
        define('WP_POST_REVISIONS', 5);
        define('AUTOSAVE_INTERVAL', 300);
        define('EMPTY_TRASH_DAYS', 30);
        
        /* Security Settings */
        define('FORCE_SSL_ADMIN', true);
        define('DISALLOW_FILE_EDIT', true);
        
        /* Cache Settings */
        define('WP_CACHE', true);
        define('CONCATENATE_SCRIPTS', false);
        define('COMPRESS_SCRIPTS', true);
        define('COMPRESS_CSS', true);
        define('ENFORCE_GZIP', true);
        
        /* Real IP Detection for Cloudflare and Proxies */
        if (isset($$_SERVER['HTTP_CF_CONNECTING_IP'])) {
            $$_SERVER['REMOTE_ADDR'] = $$_SERVER['HTTP_CF_CONNECTING_IP'];
        } elseif (isset($$_SERVER['HTTP_X_FORWARDED_FOR'])) {
            $$forwarded_ips = explode(',', $$_SERVER['HTTP_X_FORWARDED_FOR']);
            $$_SERVER['REMOTE_ADDR'] = trim($$forwarded_ips[0]);
        } elseif (isset($$_SERVER['HTTP_X_REAL_IP'])) {
            $$_SERVER['REMOTE_ADDR'] = $$_SERVER['HTTP_X_REAL_IP'];
        }
    depends_on:
      wp_db:
        condition: service_healthy
      cache-init:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - dokploy-network
    healthcheck:
      test: ["CMD-SHELL", "pidof php-fpm && test -d /var/www/html/wp-content || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  wp_db:
    image: mysql:8.4
    restart: unless-stopped
    volumes:
      - wp_data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "exit | mysql -h localhost -P 3306 -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - dokploy-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256m --maxmemory-policy allkeys-lru
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    networks:
      - dokploy-network

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    restart: unless-stopped
    depends_on:
      wordpress:
        condition: service_healthy
      cache-init:
        condition: service_completed_successfully
    volumes:
      - wp_app:/var/www/html:ro
      - nginx_cache:/var/cache/nginx
    networks:
      - dokploy-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  wp_data:
  wp_app:
  nginx_cache:

networks:
  dokploy-network:
    external: true
