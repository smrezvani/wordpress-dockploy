events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    
    # Gzip
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/xhtml+xml application/x-font-ttf application/x-font-opentype application/vnd.ms-fontobject image/svg+xml;
    
    # FastCGI cache
    fastcgi_cache_path /var/cache/nginx levels=1:2 keys_zone=WORDPRESS:100m inactive=60m;
    fastcgi_cache_key "$scheme$request_method$http_host$request_uri";
    fastcgi_cache_use_stale error timeout updating invalid_header http_500 http_503;
    
    server {
        listen 80;
        server_name _;
        
        root /var/www/html;
        index index.php index.html;
        
        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        
        # WordPress
        location / {
            try_files $uri $uri/ /index.php?$args;
        }
        
        # PHP-FPM
        location ~ \.php$ {
            try_files $uri =404;
            fastcgi_split_path_info ^(.+\.php)(/.+)$;
            
            # PHP-FPM connection
            fastcgi_pass wordpress:9000;
            fastcgi_index index.php;
            
            # FastCGI params
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param PATH_INFO $fastcgi_path_info;
            
            # FastCGI cache
            set $skip_cache 0;
            
            # POST requests should always go to PHP
            if ($request_method = POST) {
                set $skip_cache 1;
            }
            
            # URLs with query strings should always go to PHP
            if ($query_string != "") {
                set $skip_cache 1;
            }
            
            # Don't cache WordPress admin, login, and API pages
            if ($request_uri ~* "/wp-admin/|/wp-json/|/xmlrpc.php|wp-.*.php|/feed/|index.php|sitemap(_index)?.xml") {
                set $skip_cache 1;
            }
            
            # Don't cache WooCommerce pages (if using WooCommerce)
            if ($request_uri ~* "/(cart|checkout|my-account)/*$") {
                set $skip_cache 1;
            }
            
            # Don't use the cache for logged-in users or recent commenters
            if ($http_cookie ~* "comment_author|wordpress_[a-f0-9]+|wp-postpass|wordpress_no_cache|wordpress_logged_in") {
                set $skip_cache 1;
            }
            
            # Don't cache when WooCommerce cart contains items
            if ($http_cookie ~* "woocommerce_items_in_cart") {
                set $skip_cache 1;
            }
            
            fastcgi_cache_bypass $skip_cache;
            fastcgi_no_cache $skip_cache;
            fastcgi_cache WORDPRESS;
            fastcgi_cache_valid 60m;
            
            # Add cache status header
            add_header X-FastCGI-Cache $upstream_cache_status;
            
            # Add cache headers for cached responses
            set $cache_control_header "no-cache, must-revalidate, max-age=0";
            if ($upstream_cache_status = "HIT") {
                set $cache_control_header "public, max-age=3600";
            }
            add_header Cache-Control $cache_control_header;
            add_header X-Cache-Enabled "true";
            
            # Add Vary header for proper caching
            add_header Vary "Accept-Encoding, Cookie";
            
            # FastCGI buffers
            fastcgi_buffer_size 128k;
            fastcgi_buffers 256 16k;
            fastcgi_busy_buffers_size 256k;
            fastcgi_temp_file_write_size 256k;
        }
        
        # Static files
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 365d;
            add_header Cache-Control "public, immutable";
            log_not_found off;
        }
        
        # Deny access to sensitive files
        location ~ /\. {
            deny all;
        }
        
        location = /xmlrpc.php {
            deny all;
        }
        
        location ~ /wp-config\.php {
            deny all;
        }
        
        # Health check endpoint
        location = /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}