user nginx;
worker_processes auto;
worker_cpu_affinity auto;
worker_rlimit_nofile 65536;

pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # Performance optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 30;
    keepalive_requests 100;
    reset_timedout_connection on;
    
    # Buffer settings
    client_body_buffer_size 128k;
    client_max_body_size 100M;
    client_header_buffer_size 4k;
    large_client_header_buffers 8 16k;
    output_buffers 32 64k;
    postpone_output 1460;
    
    # Timeouts
    client_body_timeout 60;
    client_header_timeout 60;
    send_timeout 60;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/xhtml+xml application/x-font-ttf application/x-font-opentype application/vnd.ms-fontobject image/svg+xml;
    gzip_disable "msie6";
    
    # FastCGI cache configuration
    fastcgi_cache_path /var/cache/nginx levels=1:2 keys_zone=WORDPRESS:100m inactive=60m max_size=1g;
    fastcgi_cache_key "$scheme$request_method$host$request_uri";
    fastcgi_cache_use_stale error timeout invalid_header http_500 http_503;
    fastcgi_cache_valid 200 301 302 60m;
    fastcgi_cache_valid 404 1m;
    
    # Rate limiting
    limit_req_zone $binary_remote_addr zone=wplogin:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=wpapi:10m rate=50r/s;
    
    # Upstream PHP-FPM
    upstream php {
        server wordpress:9000 max_fails=3 fail_timeout=30s;
        keepalive 8;
    }
    
    # Logging
    access_log /var/log/nginx/access.log combined buffer=32k flush=5m;
    error_log /var/log/nginx/error.log warn;
    
    server {
        listen 80 default_server;
        server_name _;
        
        root /var/www/html;
        index index.php index.html;
        
        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        
        # Health check endpoint
        location = /nginx-health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
        
        # WordPress login rate limiting
        location = /wp-login.php {
            limit_req zone=wplogin burst=2 nodelay;
            fastcgi_pass php;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        }
        
        # WordPress admin
        location /wp-admin/ {
            location ~ \.php$ {
                fastcgi_pass php;
                include fastcgi_params;
                fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
                fastcgi_buffer_size 256k;
                fastcgi_buffers 256 16k;
                fastcgi_read_timeout 600;
            }
        }
        
        # Main WordPress catch-all route
        location / {
            try_files $uri $uri/ /index.php?$args;
        }
        
        # PHP processing with caching
        location ~ \.php$ {
            try_files $uri =404;
            fastcgi_split_path_info ^(.+\.php)(/.+)$;
            
            # Cache configuration
            set $skip_cache 0;
            
            # POST requests and URLs with query strings should always bypass cache
            if ($request_method = POST) {
                set $skip_cache 1;
            }
            if ($query_string != "") {
                set $skip_cache 1;
            }
            
            # Don't cache WordPress admin and login pages
            if ($request_uri ~* "/wp-admin/|/wp-login.php|/wp-json/") {
                set $skip_cache 1;
            }
            
            # Don't cache logged in users
            if ($http_cookie ~* "wordpress_logged_in") {
                set $skip_cache 1;
            }
            
            fastcgi_cache_bypass $skip_cache;
            fastcgi_no_cache $skip_cache;
            fastcgi_cache WORDPRESS;
            fastcgi_cache_valid 200 60m;
            
            fastcgi_pass php;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
            fastcgi_buffer_size 128k;
            fastcgi_buffers 256 16k;
            fastcgi_busy_buffers_size 256k;
            fastcgi_temp_file_write_size 256k;
            fastcgi_read_timeout 300;
            fastcgi_intercept_errors on;
            
            # Cache status header
            add_header X-FastCGI-Cache $upstream_cache_status;
        }
        
        # Static assets caching
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
            expires 365d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
        
        # Media files
        location ~* \.(mp4|webm|ogg|mp3|wav|flac|aac|pdf|doc|docx|xls|xlsx|ppt|pptx|zip|rar)$ {
            expires 30d;
            add_header Cache-Control "public";
            access_log off;
        }
        
        # Deny access to sensitive files
        location ~ /\. {
            deny all;
        }
        
        location = /xmlrpc.php {
            deny all;
        }
        
        # Deny access to wp-config.php
        location ~ /wp-config\.php {
            deny all;
        }
        
        # Deny access to hidden files
        location ~ /\.(htaccess|htpasswd|git|svn) {
            deny all;
        }
        
        # Deny access to backup files
        location ~ ~$ {
            deny all;
        }
        
        # WordPress REST API rate limiting
        location ~ ^/wp-json/ {
            limit_req zone=wpapi burst=20 nodelay;
            try_files $uri $uri/ /index.php?$args;
        }
    }
}